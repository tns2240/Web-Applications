<!-- Gemini AI Integration Script -->
<script>
    document.getElementById("geminiSubmit").addEventListener("click", async function () {
        const input = document.getElementById("geminiInput").value;
        const responseDiv = document.getElementById("geminiResponse");

        if (!input) {
            responseDiv.style.display = "block";
            responseDiv.className = "alert alert-warning";
            responseDiv.textContent = "Please enter a prompt.";
            return;
        }

        responseDiv.style.display = "block";
        responseDiv.className = "alert alert-info";
        responseDiv.textContent = "Loading...";

        try {
            // Note: In a production environment, the API key should be stored server-side or in environment variables
            const apiKey = "AIzaSyB-HkGPA-kDgGg4cyjIvnHQKVxk0R9wDug";
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: input
                        }]
                    }]
                })
            });

            if (!response.ok) {
                throw new Error("Failed to fetch response from Gemini AI.");
            }

            const data = await response.json();
            const generatedText = data.candidates[0].content.parts[0].text;

            responseDiv.className = "alert alert-success";
            responseDiv.textContent = generatedText;
        } catch (error) {
            responseDiv.className = "alert alert-danger";
            responseDiv.textContent = `Error: ${error.message}`;
        }
    });
</script>
