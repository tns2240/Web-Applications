<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - Smart Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 700px; margin: auto; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1); border-radius: 10px; }
        .navbar-brand { font-weight: bold; }
        footer { position: relative; bottom: 0; width: 100%; background-color: #343a40; color: white; padding: 10px; }
        h2 { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Online Job Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link btn btn-primary text-white" href="Home Page.html">Home</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white" href="job-listings.html">Search Jobs</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white" href="Post Job Page.html">Post a Job</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white" href="#">About Us</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white" href="Login Page.html">Log In or Sign Up</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Post a New Job</h2>
    <div class="card p-4">
        <form id="jobForm" method="POST" action="post-job.php">
            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter Job Title" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Job Category</label>
                    <select name="category" class="form-select" required>
                        <option value="">Choose a category...</option>
                        <option value="Software Development">Software Development</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Finance">Finance</option>
                        <option value="Design">Design</option>
                        <option value="Human Resources">Human Resources</option>
                        <option value="Writing & Editing">Writing & Editing</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Job Type</label>
                    <select name="type" class="form-select" required>
                        <option value="">Select Type...</option>
                        <option value="Full-Time">Full-Time</option>
                        <option value="Part-Time">Part-Time</option>
                        <option value="Internship">Internship</option>
                        <option value="Freelance">Freelance</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Location</label>
                <input type="text" name="location" class="form-control" placeholder="Enter Location" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Describe the job..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Requirements (Education & Skills)</label>
                <textarea name="requirements" class="form-control" rows="3" placeholder="Enter educational qualifications and required skills..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Salary (Optional)</label>
                <input type="text" name="salary" class="form-control" placeholder="Enter Salary Range">
            </div>

            <button type="submit" name="submit" class="btn btn-success w-100">Post Job</button>
        </form>
    </div>
</div>

<footer class="text-center mt-5">
    © 2025 Online Job Portal. All Rights Reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
